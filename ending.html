<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Yours ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0b0f19 0%, #151a30 35%, #3c2137 75%, #1c1026 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: #f7f4ef;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(15, 20, 35, 0.7);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(229, 193, 133, 0.25);
            animation: cardPop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.4rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #e5c185;
            margin: 0 0 20px 0;
            text-shadow: 0 4px 15px rgba(229, 193, 133, 0.2);
            letter-spacing: 4px;
            line-height: 1.3;
        }
        p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f7f4ef;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .heart-badge {
            font-size: 4.5rem;
            animation: pulse 1.5s infinite;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(189, 58, 93, 0.4));
        }
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.4rem; letter-spacing: 2px; }
            p { font-size: 1.05rem; line-height: 1.7; }
            .container { padding: 40px 25px; width: 88%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-badge">❤️</div>
        <h1>I Love You</h1>
        <p>Happy Birthday to the one who owns my heart entirely.</p>
        <p>To our past six beautiful months, and to every single year yet to come as husband and wife.</p>
    </div>
   
    <audio id="bg-music" src="assets/music/song.mpeg" loop></audio>
    <!-- Reusing chapter effects for continuous floating hearts -->
    <script src="js/chapter.js"></script>
</body>
</html>
